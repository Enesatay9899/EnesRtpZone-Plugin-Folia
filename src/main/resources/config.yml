# ==========================================
#         RTPZONE CONFIGURATION
# ==========================================

rtp:
  # Rastgele isinlanma mesafeleri
  max-radius: 10000
  min-radius: 1000
  # Her oyuncu icin geri sayim suresi (saniye)
  countdown: 30
  # Isinlanma yapilacak dunya (bos birakirsaniz mevcut dunyaya isinlanir)
  target-world: "world"

messages:
  prefix: "&8[&b&lКҖбҙӣбҙҳ&f&lбҙўбҙҸЙҙбҙҮ&8] &7"
  wand-received: "&aкңұбҙҮбҙ„ЙӘбҙҚ КҷбҙҖКҹбҙӣбҙҖкңұЙӘЙҙЙӘ бҙҖКҹбҙ…ЙӘЙҙЙӘбҙў. кңұбҙҸКҹ бҙ бҙҮ кңұбҙҖЙў бҙӣЙӘбҙӢ ЙӘКҹбҙҮ КҷбҙҸКҹЙўбҙҮ кңұбҙҮбҙ„ЙӘЙҙ."
  pos1-set: "&a1. бҙҳбҙҸбҙўЙӘкңұКҸбҙҸЙҙ кңұбҙҮбҙ„ЙӘКҹбҙ…ЙӘ."
  pos2-set: "&a2. бҙҳбҙҸбҙўЙӘкңұКҸбҙҸЙҙ кңұбҙҮбҙ„ЙӘКҹбҙ…ЙӘ."
  zone-created: "&aКҷбҙҸКҹЙўбҙҮ КҷбҙҖкңұбҙҖКҖЙӘКҸКҹбҙҖ бҙҸКҹбҙңкңұбҙӣбҙңКҖбҙңКҹбҙ…бҙң: &e%name%"
  entered-zone: "&cКҖбҙӣбҙҳ КҷбҙҸКҹЙўбҙҮкңұЙӘЙҙбҙҮ ЙўЙӘКҖбҙ…ЙӘЙҙЙӘбҙў! ЙӘкңұЙӘЙҙКҹбҙҖЙҙбҙҚбҙҖ КҷбҙҮбҙӢКҹбҙҮЙҙЙӘКҸбҙҸКҖ..."
  left-zone: "&cКҷбҙҸКҹЙўбҙҮбҙ…бҙҮЙҙ бҙ„ЙӘбҙӢбҙӣЙӘЙўЙӘЙҙЙӘбҙў ЙӘбҙ„ЙӘЙҙ ЙӘкңұЙӘЙҙКҹбҙҖЙҙбҙҚбҙҖ ЙӘбҙҳбҙӣбҙҖКҹ бҙҮбҙ…ЙӘКҹбҙ…ЙӘ."
  teleporting: "&aКҖбҙҖкңұЙўбҙҮКҹбҙҮ КҷЙӘКҖ КҷбҙҸКҹЙўбҙҮКҸбҙҮ ЙӘкңұЙӘЙҙКҹбҙҖЙҙбҙ…ЙӘЙҙЙӘбҙў!"
  select-first: "&cбҙҸЙҙбҙ„бҙҮ КҷбҙҖКҹбҙӣбҙҖ ЙӘКҹбҙҮ ЙӘбҙӢЙӘ ЙҙбҙҸбҙӢбҙӣбҙҖ кңұбҙҮбҙ„бҙҚбҙҮКҹЙӘкңұЙӘЙҙЙӘбҙў."
  usage: "&cбҙӢбҙңКҹКҹбҙҖЙҙЙӘбҙҚ: /КҖбҙӣбҙҳбҙўбҙҸЙҙбҙҮ <бҙЎбҙҖЙҙбҙ…|бҙ„КҖбҙҮбҙҖбҙӣбҙҮ|бҙ…бҙҮКҹбҙҮбҙӣбҙҮ|КҖбҙҮкңұбҙҮбҙӣ|КҖбҙҮКҹбҙҸбҙҖбҙ…>"
  
  # Ekranda gorunecek geri sayim yazilari
  countdown-title: "&6&l%time%"
  countdown-subtitle: "&e&nкңұбҙҖЙҙЙӘКҸбҙҮ кңұбҙҸЙҙКҖбҙҖ ЙӘкңұЙӘЙҙКҹбҙҖЙҙбҙҖбҙ„бҙҖбҙӢкңұЙӘЙҙЙӘбҙў"

# Olusturulan bolgeler otomatik olarak buraya kaydedilir.
# El ile mudahale etmenize gerek yoktur.
zones: {}